<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Transparent background -->
  <defs>
    <!-- Smooth drop shadow for readability on light/dark tabs -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- 360 Degree Orbital Sweep Arrows in Deep Charcoal -->
  <g filter="url(#shadow)">
    <!-- Bottom Orbit Ring (Arrow) -->
    <path d="M 45,340 C 45,440 467,440 467,340 C 467,315 425,325 410,345 C 385,380 127,380 102,345 C 87,325 45,315 45,340 Z" fill="#111111" />
    <!-- Arrow Head pointing right-up in the middle dynamic center -->
    <path d="M 285,412 L 255,395 L 263,425 Z" fill="#111111" />
    <!-- Arrow Head pointing left-down on the opposite side -->
    <path d="M 227,412 L 257,395 L 249,425 Z" fill="#111111" />
  </g>

  <!-- Mascot / Text Emblem -->
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <!-- PRO (Yellow PR, Black/Charcoal O) -->
    <text x="256" y="195" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="140" font-style="italic" text-anchor="middle">
      <tspan fill="#ddd900">PR</tspan><tspan fill="#111111">O</tspan>
    </text>
    
    <!-- Integra in Black/Charcoal -->
    <text x="256" y="278" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="700" font-size="74" fill="#111111" text-anchor="middle" letter-spacing="1.5">Integra</text>
    
    <!-- 360° in Yellow -->
    <text x="256" y="380" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="120" font-style="italic" fill="#ddd900" text-anchor="middle">360°</text>
  </g>
</svg>
